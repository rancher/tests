#Required for all tests
rancher:
  host: "<required>"
  adminToken: "<required>"
  insecure: true
  cleanup: true

#Required for all tests except template
clusterConfig:
  machinePools:
  - machinePoolConfig:
      etcd: true
      controlplane: false
      worker: false
      quantity: 1
  - machinePoolConfig:
      etcd: false
      controlplane: true
      worker: false
      quantity: 1
  - machinePoolConfig:
      etcd: false
      controlplane: false
      worker: true
      quantity: 1
  kubernetesVersion: ""
  cni: "<HB_CNI>"
  provider: "<HB_PROVIDER>"
  nodeProvider: "<HB_NODE_PROVIDER>"

#Required for all tests
awsCredentials:
  secretKey: "<required>"
  accessKey: "<required>"
  defaultRegion: "<required>"

#Required for tests that utilize node driver clusters
awsMachineConfigs:
  region: "<HB_AWS_REGION>"
  awsMachineConfig:
  - roles: ["etcd","controlplane","worker"]
    ami: "<HB_DEFAULT_AMI>"
    instanceType: "t3a.medium"
    sshUser: "<HB_AWS_OS_USER>"
    vpcId: "<HB_AWS_VPC_ID>"
    retries: "5"
  - roles: ["windows"]
    ami: "<HB_DEFAULT_AMI>"
    instanceType: "t2.2xlarge"
    sshUser: "<HB_AWS_OS_USER>"
    vpcId: "<HB_AWS_VPC_ID>"
    volumeType: "<HB_AWS_VOLUME_TYPE>"
    zone: "<HB_AWS_ZONE_LETTER>"
    retries: "5"
    rootSize: "<HB_AWS_ROOT_SIZE>"
logging:
  level: "<HB_LOGGING_LEVEL>"
