rancher:
  host: "<required>"
  adminPassword: "<required>"
  insecure: true
  cleanup: true

awsCredentials:
  accessKey: "<required>"
  secretKey: "<required>"
  defaultRegion: "<required>"

terraform:
  awsCredentials:
    awsAccessKey: "<AWS_ACCESS_KEY_ID>"
    awsSecretKey: "<AWS_SECRET_ACCESS_KEY>"
  cni: "<HB_CNI>"
  defaultClusterRoleForProjectMembers: "<HB_CLUSTER_ROLE_FOR_PROJECT_MEMBERS>"
  provider: "<HB_PROVIDER>"
  downstreamClusterProvider: "<HB_PROVIDER>"
  privateKeyPath: "<HB_TFP_SSH_PRIVATE_KEY_PATH>"
  resourcePrefix: "<HB_HOSTNAME_PREFIX>"
  awsConfig:
    ami: "<HB_AWS_DUALSTACK_AMI>"
    awsKeyName: "<HB_SSH_PRIVATE_KEY_NAME>"
    awsInstanceType: "<HB_AWS_INSTANCE_TYPE>"
    awsVolumeType: "<HB_AWS_VOLUME_TYPE>"
    region: "<HB_AWS_REGION>"
    awsSecurityGroups: <HB_AWS_SECURITY_GROUPS>
    awsSecurityGroupNames: <HB_AWS_SECURITY_GROUP_NAMES>
    awsSubnetID: "<HB_AWS_SUBNET_ID>"
    awsVpcID: "<HB_AWS_VPC_ID>"
    awsZoneLetter: "<HB_AWS_ZONE_LETTER>"
    awsRootSize: <HB_AWS_ROOT_SIZE>
    awsRoute53Zone: "<HB_AWS_ROUTE_53_ZONE>"
    awsUser: "<HB_DUAL_STACK_AWS_USER>"
    clusterCIDR: "<HB_DUALSTACK_CLUSTER_CIDR>"
    serviceCIDR: "<HB_DUALSTACK_SERVICE_CIDR>"
    sshConnectionType: "<HB_SSH_CONNECTION_TYPE>"
    timeout: "<HB_SSH_TIMEOUT>"
    ipAddressType: "<HB_IP_ADDRESS_TYPE>"
    loadBalancerType: "<HB_LOAD_BALANCER_DUALSTACK_TYPE>"
    targetType: "<HB_TARGET_TYPE>"
  standalone:
    bootstrapPassword: "<HB_RANCHER_ADMIN_PASSWORD>"
    certManagerVersion: "<HB_CERT_MANAGER_VERSION>"
    certType: "<HB_CERT_TYPE>"
    chartVersion: "<HB_RELEASED_RANCHER_CHART_VERSION>"
    osUser: "<HB_DUAL_STACK_OS_USER>"
    osGroup: "<HB_DUAL_STACK_OS_GROUP>"
    rancherChartRepository: "<HB_RANCHER_HELM_CHART_URL>"
    rancherHostname: "<HB_RANCHER_HOSTNAME>"
    rancherImage: "<HB_RANCHER_IMAGE>"
    rancherTagVersion: "<HB_RELEASED_RANCHER_VERSION>"
    registryPassword: "<HB_DOCKERHUB_PASSWORD>"
    registryUsername: "<HB_DOCKERHUB_USERNAME>"
    repo: "<HB_RANCHER_REPO>"
    rke2Version: "<HB_RKE2_VERSION>"
    upgradedRancherChartRepository: "<HB_UPGRADED_RANCHER_HELM_CHART_URL>"
    upgradedRancherChartVersion: "<HB_UPGRADED_RANCHER_CHART_VERSION>"
    upgradedRancherImage: "<HB_UPGRADED_RANCHER_IMAGE>"
    upgradedRancherRepo: "<HB_UPGRADED_RANCHER_REPO>"
    upgradedRancherTagVersion: "<HB_UPGRADED_RANCHER_VERSION>"
logging:
  level: "<HB_LOGGING_LEVEL>"
