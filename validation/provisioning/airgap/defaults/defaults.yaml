#Required for all tests
rancher:
  host: "<required>"
  adminToken: "<required>"
  insecure: true
  cleanup: true

#Required for all tests
clusterConfig:
  machinePools:
  - machinePoolConfig:
      etcd: true
      controlplane: false
      worker: false
      quantity: 3
  - machinePoolConfig:
      etcd: false
      controlplane: true
      worker: false
      quantity: 2
  - machinePoolConfig:
      etcd: false
      controlplane: false
      worker: true
      quantity: 3
  kubernetesVersion: ""
  cni: "calico"
  provider: "aws"
  nodeProvider: "ec2"

#Required for tests that utilize custom clusters
awsEC2Configs:
  region: "us-east-2"
  awsSecretAccessKey: "<required>"
  awsAccessKeyID: "<required>"
  awsEC2Config:
    - instanceType: "t3a.medium"
      awsRegionAZ: ""
      awsSSHKeyName: "<required>"
      awsAMI: "<required>"
      awsSecurityGroups: ["<required>"]
      awsSSHKeyName: "<required>"
      awsCICDInstanceTag: "<required>"
      awsIAMProfile: ""
      awsUser: "<required>"
      volumeSize: 100
      roles: ["etcd", "controlplane", "worker"]
    - instanceType: "t2.2xlarge"
      awsRegionAZ: ""
      awsSSHKeyName: "<required>"
      awsAMI: "<required>"
      awsSecurityGroups: ["<required>"]
      awsSSHKeyName: "<required>"
      awsCICDInstanceTag: "<required>"
      awsIAMProfile: ""
      awsUser: "<required>"
      volumeSize: 100
      roles: ["windows"]

terraform:
  airgapBastion: "<required>"