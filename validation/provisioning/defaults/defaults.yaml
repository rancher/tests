#Required for all tests
rancher:
  host: "<required>"
  adminToken: "<required>"
  insecure: true
  cleanup: true

#Required for all tests except template
clusterConfig:
  machinePools:
  - machinePoolConfig:
      etcd: true
      controlplane: false
      worker: false
      quantity: 1
  - machinePoolConfig:
      etcd: false
      controlplane: true
      worker: false
      quantity: 1
  - machinePoolConfig:
      etcd: false
      controlplane: false
      worker: true
      quantity: 1
  kubernetesVersion: ""
  cni: "<HB_CNI>"
  provider: "<HB_PROVIDER>"
  nodeProvider: "<HB_NODE_PROVIDER>"

#Required for all tests except template
awsCredentials:
  secretKey: "<required>"
  accessKey: "<required>"
  defaultRegion: "<required>"

#Required for tests that utilize node driver clusters
awsMachineConfigs:
  region: "<HB_AWS_REGION>"
  awsMachineConfig:
  - roles: ["etcd","controlplane","worker"]
    iamInstanceProfile: "<HB_AWS_IAM_PROFILE>"
    ami: "<HB_DEFAULT_AMI>"
    instanceType: "t3a.medium"
    volumeType: "<HB_AWS_VOLUME_TYPE>"
    rootSize: "<HB_AWS_ROOT_SIZE>"
    sshUser: "<HB_AWS_OS_USER>"
    subnetId: "<HB_AWS_SUBNET_ID>"
    vpcId: "<HB_AWS_VPC_ID>"
    zone: "<HB_AWS_ZONE_LETTER>"
    retries: "5"
  - roles: ["windows"]
    iamInstanceProfile: "<HB_AWS_IAM_PROFILE>"
    ami: "<HB_DEFAULT_AMI>"
    instanceType: "t2.2xlarge"
    sshUser: "<HB_AWS_OS_USER>"
    subnetId: "<HB_AWS_SUBNET_ID>"
    vpcId: "<HB_AWS_VPC_ID>"
    volumeType: "<HB_AWS_VOLUME_TYPE>"
    zone: "<HB_AWS_ZONE_LETTER>"
    retries: "5"
    rootSize: "<HB_AWS_ROOT_SIZE>" 


#terraform and terratest variables required for custom cluster provisioning
terraform:
  provider: "<HB_PROVIDER>"
  cni: "<HB_CNI>"
  downstreamClusterProvider: "aws"
  defaultClusterRoleForProjectMembers: "<HB_CLUSTER_ROLE_FOR_PROJECT_MEMBERS>"
  resourcePrefix: "<HB_RESOURCE_PREFIX>"
  module: ""
  privateKeyPath: "<HB_TFP_SSH_PRIVATE_KEY_PATH>"

  awsCredentials:
    awsAccessKey: "<AWS_ACCESS_KEY_ID>"
    awsSecretKey: "<AWS_SECRET_ACCESS_KEY>"

  awsConfig:
    ami: "<HB_DEFAULT_AMI>"
    awsKeyName: "<HB_SSH_PRIVATE_KEY_NAME>"
    awsVolumeType: "gp3"
    region: "<HB_AWS_REGION>"
    awsSecurityGroups: ["<HB_AWS_SECURITY_GROUPS>"]
    awsSecurityGroupNames: ["<HB_AWS_SECURITY_GROUP_NAMES>"]
    awsSubnetID: "<HB_AWS_SUBNET_ID>"
    awsVpcID: "<HB_AWS_VPC_ID>"
    awsInstanceType: "t3a.medium"
    awsZoneLetter: "a"
    awsRootSize: 100
    awsRoute53Zone: "<HB_AWS_ROUTE_53_ZONE>"
    awsUser: "<HB_AWS_OS_USER>"
    ipAddressType: "<HB_IP_ADDRESS_TYPE>"
    loadBalancerType: "<HB_LOAD_BALANCER_TYPE>"
    targetType: "<HB_TARGET_TYPE>"
    sshConnectionType: "<HB_SSH_CONNECTION_TYPE>"
    timeout: "<HB_SSH_TIMEOUT>"

terratest:
  kubernetesVersion: ""

#Required for custom cluster provisioning
awsEC2Configs:
  region: "<HB_AWS_REGION>"
  awsSecretAccessKey: "<AWS_SECRET_ACCESS_KEY>"
  awsAccessKeyID: "<AWS_ACCESS_KEY_ID>"
  awsEC2Config:
    - instanceType: "t3a.medium"
      awsAMI: "<HB_DEFAULT_AMI>"
      awsSecurityGroups: ["<HB_AWS_SECURITY_GROUPS>"]
      awsSSHKeyName: "<HB_SSH_PRIVATE_KEY_NAME>"
      awsCICDInstanceTag: "<HB_AWS_CICD_INSTANCE_TAG>"
      awsIAMProfile: "<HB_AWS_IAM_PROFILE>"
      awsUser: "<HB_AWS_OS_USER>"
      volumeSize: "<HB_AWS_ROOT_SIZE>"
      roles: ["etcd", "controlplane", "worker"]
    - instanceType: "t2.2xlarge"
      awsAMI: "<HB_DEFAULT_AMI>"
      awsSecurityGroups: ["<HB_AWS_SECURITY_GROUPS>"]
      awsSSHKeyName: "<HB_SSH_PRIVATE_KEY_NAME>"
      awsCICDInstanceTag: "<HB_AWS_CICD_INSTANCE_TAG>"
      awsIAMProfile: "<HB_AWS_IAM_PROFILE>"
      awsUser: "<HB_AWS_OS_USER>"
      volumeSize: "<HB_AWS_ROOT_SIZE>"
      roles: ["windows"]

#Required for tests that utilize custom clusters
sshPath:
   sshPath: "<HB_TESTS_SSH_DIR_PATH>"

logging:
  level: "<HB_LOGGING_LEVEL>"

workloadConfigs:
  deployment:
    metadata:
      generateName: "testdeployment-"
    spec:
      selector:
        matchLabels:
          "workload.user.cattle.io/workloadselector": "testdeployment"
      template:
        metadata:
          labels:
            "workload.user.cattle.io/workloadselector": "testdeployment"
        spec:
          containers:
            - name: "testdeployment"
              image: "nginx:latest"
  
  daemonset:
    metadata:
      generateName: "testdaemonset-"
    spec:
      selector:
        matchLabels:
          "workload.user.cattle.io/workloadselector": "testdaemonset"
      template:
        metadata:
          labels:
            "workload.user.cattle.io/workloadselector": "testdaemonset"
        spec:
          containers:
            - name: "testdaemonset"
              image: "nginx:latest"

  cronjob:
    metadata:
      generateName: "testcronjob-"
    spec:
      schedule: "* * * * *"
      jobTemplate:
        metadata:
          generateName: "testcronjob-"
        spec:
          template:
            generateName: testcronjob-
            spec:
              restartPolicy: "Never"
              containers:
                - name: "testcronjob"
                  image: "nginx:latest"

  job:
    metadata:
      generateName: "testjob-"
    spec:
      template:
        metadata:
          generateName: "testjob-"
        spec:
          generateName: testjob-
          restartPolicy: "Never"
          containers:
            - name: "testjob"
              image: "nginx:latest"
              command: ["sh", "-c", "echo Hello World; sleep 30"]
  
  pod:
    metadata:
      generateName: "testpod-"
    spec:
      generateName: testpod-
      containers:
        - name: "testpod"
          image: "nginx:latest"

  statefulset:
    metadata:
      generateName: "teststatefulset-"
    spec:
      selector:
        matchLabels:
          "workload.user.cattle.io/workloadselector": "teststatefulset"
      template:
        metadata:
          labels:
            "workload.user.cattle.io/workloadselector": "teststatefulset"
        spec:
          containers:
            - name: "teststatefulset"
              image: "nginx:latest"
