#Required for all tests
rancher:
  host: "<required>"
  adminToken: "<required>"
  insecure: true
  cleanup: true

#Required for all tests except template
clusterConfig:
  machinePools:
  - machinePoolConfig:
      etcd: true
      controlplane: false
      worker: false
      quantity: 3
  - machinePoolConfig:
      etcd: false
      controlplane: true
      worker: false
      quantity: 2
  - machinePoolConfig:
      etcd: false
      controlplane: false
      worker: true
      quantity: 3
  kubernetesVersion: ""
  cni: "<HB_CNI>"
  provider: "<HB_PROVIDER>"
  nodeProvider: "<HB_NODE_PROVIDER>"

#Required for all tests
awsCredentials:
  secretKey: "<required>"
  accessKey: "<required>"
  defaultRegion: "<required>"

#Required for tests that utilize node driver clusters
awsMachineConfigs:
  region: "<HB_AWS_REGION>"
  awsMachineConfig:
  - roles: ["etcd","controlplane","worker"]
    ami: "<HB_DEFAULT_AMI>"
    instanceType: "t3a.medium"
    volumeType: "<HB_AWS_VOLUME_TYPE>"
    rootSize: "<HB_AWS_ROOT_SIZE>"
    sshUser: "<HB_AWS_OS_USER>"
    vpcId: "<HB_AWS_VPC_ID>"
    retries: "5"
    zone: "<HB_AWS_ZONE_LETTER>"
  - roles: ["windows"]
    ami: "<HB_DEFAULT_AMI>"
    instanceType: "t2.2xlarge"
    sshUser: "<HB_AWS_OS_USER>"
    vpcId: "<HB_AWS_VPC_ID>"
    volumeType: "<HB_AWS_VOLUME_TYPE>"
    zone: "<HB_AWS_ZONE_LETTER>"
    retries: "5"
    rootSize: "<HB_AWS_ROOT_SIZE>"

#Required for tests that utilize custom clusters
awsEC2Configs:
  region: "<HB_AWS_REGION>"
  awsSecretAccessKey: "<AWS_SECRET_ACCESS_KEY>"
  awsAccessKeyID: "<AWS_ACCESS_KEY_ID>"
  awsEC2Config:
    - instanceType: "t3a.medium"
      awsSSHKeyName: "<HB_SSH_PRIVATE_KEY_NAME>"
      awsAMI: "<HB_DEFAULT_AMI>"
      awsSecurityGroups: <HB_AWS_SECURITY_GROUPS>
      awsSSHKeyName: "<HB_SSH_PRIVATE_KEY_NAME>"
      awsCICDInstanceTag: "<HB_AWS_CICD_INSTANCE_TAG>"
      awsIAMProfile: "<HB_AWS_IAM_PROFILE>"
      awsUser: "<HB_AWS_OS_USER>"
      volumeSize: "<HB_AWS_ROOT_SIZE>"
      roles: ["etcd", "controlplane", "worker"]
    - instanceType: "t2.2xlarge"
      awsSSHKeyName: "<HB_SSH_PRIVATE_KEY_NAME>"
      awsAMI: "<HB_DEFAULT_AMI>"
      awsSecurityGroups: <HB_AWS_SECURITY_GROUPS>
      awsSSHKeyName: "<HB_SSH_PRIVATE_KEY_NAME>"
      awsCICDInstanceTag: "<HB_AWS_CICD_INSTANCE_TAG>"
      awsIAMProfile: "<HB_AWS_IAM_PROFILE>"
      awsUser: "<HB_AWS_OS_USER>"
      volumeSize: "<HB_AWS_ROOT_SIZE>"
      roles: ["windows"]
logging:
  level: "<HB_LOGGING_LEVEL>"
