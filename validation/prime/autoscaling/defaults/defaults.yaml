#Required for all tests that provision clusters
clusterConfig:
  kubernetesVersion: ""
  cni: "<HB_CNI>"
  provider: "<HB_PROVIDER>"
  nodeProvider: "<HB_NODE_PROVIDER>"

#Required for all tests
awsCredentials:
  secretKey: "<required>"
  accessKey: "<required>"
  defaultRegion: "<required>"

#Required for tests that utilize node driver clusters
awsMachineConfigs:
  region: "us-east-2"
  awsMachineConfig:
  - roles: ["etcd","controlplane","worker"]
    ami: "<required>"
    instanceType: "t3a.xlarge"
    volumeType: "<required>"
    rootSize: "<required>"
    sshUser: "<required>"
    vpcId: "<required>"
    retries: "5"
    zone: "<HB_AWS_ZONE_LETTER>"
logging:
  level: "<HB_LOGGING_LEVEL>"
